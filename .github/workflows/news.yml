name: news-newsjack
# Once a day: discover preparedness news (free Google News RSS), let Claude filter out anything
# non-compliant, score the rest, tag the best-fit product, and write the shortlist (with a ready
# ad angle) to the "News" tab of the same Google Sheet the comment archive uses.
# Secrets required: ANTHROPIC_API_KEY, SHEET_WEBHOOK_URL, SHEET_WEBHOOK_TOKEN.
on:
  schedule:
    - cron: "0 12 * * *"   # daily ~12:00 UTC (≈08:00 ET) — fresh angles waiting for the US team
  workflow_dispatch:        # manual "Run workflow" button
    inputs:
      dry:
        description: "Dry run — score & print only, do NOT write to the sheet"
        type: boolean
        default: false
      probe:
        description: "Probe — write ONE test row to the News tab to verify the deploy"
        type: boolean
        default: false
permissions:
  contents: write           # to commit the news seen-store back
concurrency:
  group: news-newsjack
  cancel-in-progress: false
jobs:
  newsjack:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - name: Discover, score & write the news shortlist
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_WEBHOOK_URL: ${{ secrets.SHEET_WEBHOOK_URL }}
          SHEET_WEBHOOK_TOKEN: ${{ secrets.SHEET_WEBHOOK_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}   # gpt-image-1 geopolitical-map images
        run: |
          ARGS=""
          [ "${{ github.event.inputs.probe }}" = "true" ] && ARGS="--probe"
          [ "${{ github.event.inputs.dry }}" = "true" ] && ARGS="--dry"
          echo "running: node bin/news-run.js $ARGS"
          node bin/news-run.js $ARGS
      - name: Persist news seen-store
        if: always()
        run: |
          git config user.name "qp-news-bot"
          git config user.email "qp-news-bot@users.noreply.github.com"
          git add -A state || true
          git commit -m "state: news run [skip ci]" || echo "no state changes"
          git pull --rebase --autostash origin main || true
          git push || echo "push skipped"
