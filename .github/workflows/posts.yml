name: daily-posts
# Generates and schedules ONE post per page per day — a per-page mix of story (text) / link /
# photo (Gemini photoreal image), each in that page's own persona voice. Text via OpenAI gpt-4o-mini.
on:
  schedule:
    - cron: "0 10 * * *"   # daily ~10:00 UTC (≈06:00 ET, before the 8-20 ET posting window)
    - cron: "0 15 * * *"   # catch-up: retries anything unpublished (e.g. after a Meta rate-limit)
  workflow_dispatch:
    inputs:
      dry:
        description: "Dry run — generate & print previews only, do NOT fill/publish"
        type: boolean
        default: false
      preview_max:
        description: "Dry run: how many previews to generate"
        type: string
        default: "17"
permissions:
  contents: write
concurrency:
  group: daily-posts
  cancel-in-progress: false
jobs:
  generate-and-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - name: Refresh page map (non-fatal — falls back to the committed map on rate limits)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: node bin/build-map.js || echo "map refresh skipped — using committed page-topic-map.json"
      - name: Generate today's posts
        env:
          TEXT_ENGINE: openai                               # Anthropic drained → OpenAI gpt-4o-mini
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}     # free photoreal images for photo posts
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        run: |
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then
            node bin/generate-day.js --dry --max ${{ github.event.inputs.preview_max }}
          else
            node bin/generate-day.js
          fi
      - name: Schedule on Facebook
        if: ${{ github.event.inputs.dry != 'true' }}
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: node bin/publish.js
      - name: Persist post state
        if: ${{ always() && github.event.inputs.dry != 'true' }}
        run: |
          git config user.name "qp-post-bot"
          git config user.email "qp-post-bot@users.noreply.github.com"
          git add -A state page-topic-map.json || true
          git commit -m "state: post run [skip ci]" || echo "no state changes"
          git pull --rebase --autostash origin main || true
          git push || echo "push skipped"
